# Server Configuration
server.port=8080
server.servlet.context-path=/api

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/tradingApp
spring.data.mongodb.auto-index-creation=true

# JWT Properties
jwt.secret=tradingAppSecretKey123456789012345678901234567890
jwt.expirationMs=86400000

# Market Data API Keys
yahoofinance.api.key=${YAHOO_FINANCE_API_KEY}
alphavantage.api.key=${ALPHA_VANTAGE_API_KEY}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.trading.app=DEBUG

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5000