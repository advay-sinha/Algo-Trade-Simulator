# Server Configuration
server.port=8080
server.servlet.context-path=/api

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/trading_app
spring.data.mongodb.auto-index-creation=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.trading.app=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# API Configuration
yahoo.finance.api.key=${YAHOO_FINANCE_API_KEY}
yahoo.finance.api.baseUrl=https://yfapi.net

alpha.vantage.api.key=${ALPHA_VANTAGE_API_KEY}
alpha.vantage.api.baseUrl=https://www.alphavantage.co

# CORS Configuration
cors.allowed-origins=http://localhost:5000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# JWT Configuration for Security
jwt.secret=your-secret-key
jwt.expirationMs=86400000

# Scheduler Configuration for Background Tasks
scheduler.enabled=true
scheduler.market-data-update.cron=0 */5 * * * *
scheduler.simulation-process.cron=0 */1 * * * *